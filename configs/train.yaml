# ── Model ────────────────────────────────────────────────────
model_name : "unsloth/Llama-3.2-1B-Instruct"
max_seq_length: 256
load_in_4bit : true

# ── LoRA ─────────────────────────────────────────────────────
lora_r : 16
lora_alpha  : 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# ── Training ─────────────────────────────────────────────────
num_epochs : 3
batch_size : 4
gradient_accumulation_steps: 4
learning_rate : 2e-4
weight_decay : 0.01
warmup_ratio : 0.05
optimizer : "adamw_8bit"
lr_scheduler : "cosine"
seed : 42
logging_steps : 10

# ── Data ─────────────────────────────────────────────────────
dataset_name : "PolyAI/banking77"
num_intents : 45
test_size  : 0.20
output_dir : "sample_data"

# ── Output ───────────────────────────────────────────────────
checkpoint_save_path : "outputs/checkpoint"
